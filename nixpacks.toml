# Nixpacks build config for Railway.
#
# `opencv-python` (transitive dep of `pipecat-ai[webrtc]` via aiortc) eager-
# imports `cv2`, which dlopens X11/GL runtime libs. The slim Nixpacks Ubuntu
# image doesn't ship them, so we install the full opencv runtime set via apt.
# They land in /usr/lib/x86_64-linux-gnu/.
#
# IMPORTANT: do NOT set LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu at build
# time. The Nix-built Python is linked against Nix's glibc; if /usr/lib is
# in the dynamic linker's search path during pip install, the linker pulls in
# Ubuntu's libc.so / ld.so on top of Nix binaries and crashes with vDSO
# symbol-resolution errors (e.g. `__vdso_time: invalid mode for dlopen()`).
#
# Instead, LD_LIBRARY_PATH is exported only at runtime in railway.json's
# startCommand — the build phase stays on its native Nix paths, and only the
# uvicorn process gets the apt libs added to its search path.

[phases.setup]
aptPkgs = [
  "...",
  "libgl1",
  "libglib2.0-0",
  "libsm6",
  "libxext6",
  "libxrender1",
]
